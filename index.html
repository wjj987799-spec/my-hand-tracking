<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; color:white; }
        video { width: 90%; border: 2px solid #0f0; border-radius: 10px; }
    </style>
</head>
<body>
    <p id="status">正在请求摄像头...</p>
    <video id="webcam" autoplay playsinline></video>
    <script>
        async function start() {
            const video = document.getElementById('webcam');
            const status = document.getElementById('status');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                status.innerText = "摄像头画面已接入！";
            } catch (err) {
                status.innerText = "错误: " + err.message;
            }
        }
        start();
    </script>
</body>
</html>
