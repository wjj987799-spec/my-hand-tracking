<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        #output { position:absolute; width:100%; height:100%; object-fit:cover; }
        .particle { position:absolute; border-radius:50%; pointer-events:none; }
    </style>
</head>
<body>
    <video id="output" autoplay playsinline></video>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script>
        const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1 });
        
        hands.onResults(res => {
            if(res.multiHandLandmarks?.length) {
                const x = res.multiHandLandmarks[0][8].x * window.innerWidth;
                const y = res.multiHandLandmarks[0][8].y * window.innerHeight;
                createParticle(x, y);
            }
        });

        function createParticle(x, y) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.style.width = p.style.height = (Math.random()*10+5) + 'px';
            p.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 500); // 粒子500ms后消失
        }

        const video = document.getElementById('output');
        new Camera(video, { onFrame: async () => await hands.send({image: video}), width: 640, height: 480 }).start();
    </script>
</body>
</html>
