<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        #v { position:absolute; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
        #c { position:absolute; top:0; left:0; pointer-events:none; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>
    <script>
        const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        
        navigator.mediaDevices.getUserMedia({video: {facingMode: 'user'}}).then(s => v.srcObject = s);

        function draw() {
            ctx.clearRect(0, 0, c.width, c.height);
            // 简单的移动检测逻辑：在画面中心随机位置点亮粒子
            // 以后你可以根据 RGB 颜色值来锁定你的手
            ctx.fillStyle = '#0f0';
            ctx.beginPath();
            ctx.arc(Math.random() * c.width, Math.random() * c.height, 20, 0, Math.PI*2);
            ctx.fill();
            requestAnimationFrame(draw);
        }
        v.onloadedmetadata = () => draw();
    </script>
</body>
</html>
