<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        #v { position:absolute; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); opacity:0.2; }
        #c { position:absolute; top:0; left:0; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>
    <script>
        const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');
        let particles = [], x = window.innerWidth/2, y = window.innerHeight/2;

        navigator.mediaDevices.getUserMedia({video: true}).then(s => v.srcObject = s);

        // 粒子系统：增加重力感和阻尼感
        function createParticle(tx, ty) {
            for(let i=0; i<3; i++) {
                particles.push({
                    x: tx, y: ty,
                    vx: (Math.random()-0.5)*8,
                    vy: (Math.random()-0.5)*8,
                    size: Math.random()*6 + 2,
                    life: 1.0,
                    hue: Math.random()*60 + 180 // 偏向科幻蓝/青色系
                });
            }
        }

        function animate() {
            // 滤色模式：叠加发光效果的核心
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; 
            ctx.fillRect(0,0,c.width,c.height);
            ctx.globalCompositeOperation = 'lighter'; 

            // 模拟手势追踪位置 (这里你可以通过后续引入简单的色彩定位来精准跟随)
            x += ( (window.innerWidth/2 + Math.sin(Date.now()/500)*200) - x) * 0.1;
            y += ( (window.innerHeight/2 + Math.cos(Date.now()/500)*200) - y) * 0.1;
            createParticle(x, y);

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.015;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${p.hue}, 100%, 50%)`;
                ctx.fillStyle = `hsl(${p.hue}, 100%, 50%)`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
                ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        c.width = window.innerWidth; c.height = window.innerHeight;
        animate();
    </script>
</body>
</html>
