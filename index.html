<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin:0; overflow:hidden; background:#000; }
        #output { position:absolute; width:100%; height:100%; object-fit:cover; z-index:1; }
        #particles { position:absolute; top:0; left:0; z-index:2; }
    </style>
</head>
<body>
    <video id="output" autoplay playsinline></video>
    <canvas id="particles"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let targetX = 0, targetY = 0;
        let particles = [];

        // 粒子类
        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedX = Math.random() * 4 - 2;
                this.speedY = Math.random() * 4 - 2;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.size *= 0.95; }
            draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
        }

        const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1 });
        hands.onResults(res => {
            if(res.multiHandLandmarks?.length) {
                targetX = res.multiHandLandmarks[0][8].x * canvas.width;
                targetY = res.multiHandLandmarks[0][8].y * canvas.height;
                for(let i=0; i<3; i++) particles.push(new Particle(targetX, targetY));
            }
        });

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            particles = particles.filter(p => p.size > 0.1);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        const video = document.getElementById('output');
        new Camera(video, { onFrame: async () => await hands.send({image: video}), width: 640, height: 480 }).start();
        animate();
    </script>
</body>
</html>
