<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; background:#000; overflow:hidden; touch-action: none; }
        canvas { position:absolute; top:0; left:0; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
        const c = document.getElementById('c'), ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let particles = [];

        // 交互逻辑：手指在屏幕上滑动，产生绚丽粒子
        window.addEventListener('touchmove', e => {
            for(let i=0; i<3; i++) {
                particles.push({
                    x: e.touches[0].clientX,
                    y: e.touches[0].clientY,
                    vx: (Math.random()-0.5)*10,
                    vy: (Math.random()-0.5)*10,
                    life: 1.0,
                    color: Math.random()*60 + 180 // 科幻蓝调
                });
            }
        });

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; 
            ctx.fillRect(0,0,c.width,c.height);
            ctx.globalCompositeOperation = 'lighter';

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.015;
                if(p.life <= 0) particles.splice(i, 1);
                else {
                    ctx.fillStyle = `hsla(${p.color}, 100%, 60%, ${p.life})`;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = `hsl(${p.color}, 100%, 50%)`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.life*8, 0, Math.PI*2);
                    ctx.fill();
                }
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
