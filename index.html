<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; background:#000; display:flex; justify-content:center; }
        /* 强制视频层在 iOS 上可见 */
        #output { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; }
    </style>
</head>
<body>
    <video id="output" autoplay playsinline></video>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script>
        const videoElement = document.getElementById('output');
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1 });
        hands.onResults((results) => {
            // 这里是逻辑处理区
            if(results.multiHandLandmarks) {
                console.log("检测到手部坐标");
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
