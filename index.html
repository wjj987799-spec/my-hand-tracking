<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>body { background: #000; color: #fff; font-family: monospace; padding: 20px; }</style>
</head>
<body>
    <div id="log">正在尝试加载...</div>
    <script>
        const logDiv = document.getElementById('log');
        function log(msg) { logDiv.innerHTML += "<br>> " + msg; }
        
        window.onerror = (e) => log("错误: " + e);
        
        // 尝试加载必要的脚本
        const scripts = [
            "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js",
            "https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
        ];

        async function load() {
            for(const url of scripts) {
                await new Promise((res, rej) => {
                    const s = document.createElement('script');
                    s.src = url;
                    s.onload = () => { log("加载成功: " + url.split('/').pop()); res(); };
                    s.onerror = () => { log("加载失败: " + url.split('/').pop()); rej(); };
                    document.body.appendChild(s);
                });
            }
            log("所有库已加载，正在启动模型...");
        }
        load();
    </script>
</body>
</html>
