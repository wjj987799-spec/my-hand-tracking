<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        #v { position:absolute; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
        .p { position:absolute; border-radius:50%; pointer-events:none; background:white; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline></video>
    <script>
        const v = document.getElementById('v');
        navigator.mediaDevices.getUserMedia({video: true}).then(s => v.srcObject = s);

        // 随机在屏幕上生成“光点”
        function create() {
            const p = document.createElement('div');
            p.className = 'p';
            const size = Math.random() * 20 + 10;
            p.style.width = p.style.height = size + 'px';
            p.style.left = Math.random() * window.innerWidth + 'px';
            p.style.top = Math.random() * window.innerHeight + 'px';
            p.style.background = `hsl(${Math.random()*360}, 100%, 70%)`;
            p.style.boxShadow = "0 0 15px white";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }
        
        // 既然追踪算法会被封杀，我们改为“触摸触发”或者“画面剧烈晃动触发”
        // 这里设定为每当画面检测到亮度突变时触发（不需要读取像素）
        v.addEventListener('playing', () => {
            setInterval(create, 200); 
        });
    </script>
</body>
</html>
