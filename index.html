<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; background:#050505; overflow:hidden; touch-action: none; }
        canvas { position:absolute; top:0; left:0; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
        const c = document.getElementById('c'), ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let particles = [];

        // 神经网络粒子类
        class NeuralParticle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.velocity = Math.random() * 2 + 1;
                this.life = 1.0;
                this.decay = Math.random() * 0.01 + 0.005;
                this.color = Math.random() > 0.5 ? 200 : 280; // 青蓝与紫罗兰切换
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.color}, 100%, 60%, ${this.life})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsla(${this.color}, 100%, 50%, 1)`;
                ctx.fill();
            }
        }

        window.addEventListener('touchmove', e => {
            for(let i=0; i<4; i++) particles.push(new NeuralParticle(e.touches[0].clientX, e.touches[0].clientY));
        });

        function animate() {
            // 背景透视感
            ctx.fillStyle = 'rgba(5, 5, 5, 0.15)'; 
            ctx.fillRect(0, 0, c.width, c.height);
            ctx.globalCompositeOperation = 'lighter';

            particles.forEach((p, i) => {
                p.x += Math.cos(p.angle) * p.velocity;
                p.y += Math.sin(p.angle) * p.velocity;
                p.life -= p.decay;
                
                if(p.life <= 0) particles.splice(i, 1);
                else p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
