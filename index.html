<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Omega 灵气化剑引擎</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010306; font-family: -apple-system, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ffff; font-weight: bold; text-shadow: 0 0 10px #00ffff; letter-spacing: 2px; z-index: 10; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>

    <div id="ui">▶ 虚幻级等离子泛光已激活 | 剑气扰动：Max</div>
    <div id="canvas-container"></div>

    <script>
        const container = document.getElementById('canvas-container');
        
        // 1. 基础场景设置
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010306, 0.003);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 35);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        // 开启物理光照衰减，准备接收极高亮度的溢出
        renderer.toneMapping = THREE.ReinhardToneMapping;
        container.appendChild(renderer.domElement);

        // ==========================================
        // 核心武器 1：虚幻级泛光管线 (UnrealBloom)
        // ==========================================
        const renderScene = new THREE.RenderPass(scene, camera);
        // 参数：分辨率, 泛光强度, 半径, 阈值(超过多亮才会发光)
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.8, 0.1);
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // ==========================================
        // 核心武器 2：手搓剑气扰动 Shader
        // ==========================================
        // 用数学模拟等离子体的不规则流动
        const swordVertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            void main() {
                vUv = uv;
                vPosition = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const swordFragmentShader = `
            uniform float uTime;
            varying vec2 vUv;
            varying vec3 vPosition;

            // 极简伪随机噪声函数
            float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }
            
            void main() {
                // 基础颜色设定：图里的青蓝色
                vec3 cyanGlow = vec3(0.0, 0.8, 1.0);
                vec3 coreWhite = vec3(1.0, 1.0, 1.0);
                
                // 1. 让能量像水一样从剑柄流向剑尖 (Y轴流动)
                float flow = sin(vUv.y * 20.0 - uTime * 15.0) * 0.5 + 0.5;
                
                // 2. 剑脊线绝对纯白高亮核心 (横向居中)
                float centerDist = abs(vUv.x - 0.5);
                float core = smoothstep(0.15, 0.0, centerDist);
                
                // 3. 边缘等离子撕裂感 (加入时间噪声扰动)
                float noise = random(vUv * 10.0 + uTime) * 0.3;
                float edgeAlpha = smoothstep(0.5, 0.1, centerDist + noise);
                
                // 颜色合成：白热化内核 + 青色耀斑 + 流动能量
                vec3 finalColor = mix(cyanGlow * (flow + 0.5), coreWhite, core * 1.5);
                
                // 剑尖渐隐 (根据 Y 轴坐标)
                float tipFade = smoothstep(1.0, 0.7, vUv.y);
                float hiltFade = smoothstep(0.0, 0.1, vUv.y);
                
                gl_FragColor = vec4(finalColor, edgeAlpha * tipFade * hiltFade);
            }
        `;

        // ==========================================
        // 剑体建模与装配
        // ==========================================
        const swordGroup = new THREE.Group();
        
        // 使用平面代替复杂的 3D 剑身，因为发光体会吞噬几何细节，平面渲染最平滑
        const bladeGeo = new THREE.PlaneGeometry(3, 25, 32, 64);
        const bladeMat = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0.0 } },
            vertexShader: swordVertexShader,
            fragmentShader: swordFragmentShader,
            transparent: true,
            blending: THREE.AdditiveBlending, // 加色混合，越叠越亮
            depthWrite: false,
            side: THREE.DoubleSide
        });

        const blade = new THREE.Mesh(bladeGeo, bladeMat);
        // 让剑悬浮并倾斜，模拟图片里的角度
        blade.rotation.z = Math.PI / 4;
        blade.rotation.x = Math.PI / 6;
        swordGroup.add(blade);
        scene.add(swordGroup);

        // ==========================================
        // 核心武器 3：逸散的灵气火花 (Sparks)
        // ==========================================
        const sparkCount = 300;
        const sparkGeo = new THREE.BufferGeometry();
        const sparkPos = new Float32Array(sparkCount * 3);
        const sparkVel = [];

        for(let i=0; i<sparkCount; i++) {
            // 在剑周围随机生成
            sparkPos[i*3] = (Math.random() - 0.5) * 5;
            sparkPos[i*3+1] = (Math.random() - 0.5) * 20;
            sparkPos[i*3+2] = (Math.random() - 0.5) * 2;
            
            // 火花的向上漂浮速度和旋转
            sparkVel.push({
                x: (Math.random() - 0.5) * 0.05,
                y: Math.random() * 0.1 + 0.05,
                z: (Math.random() - 0.5) * 0.05
            });
        }
        sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));

        const sparkMat = new THREE.PointsMaterial({
            color: 0x00ffff, size: 0.2, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.8
        });
        const sparks = new THREE.Points(sparkGeo, sparkMat);
        swordGroup.add(sparks);

        // ==========================================
        // 渲染循环与动画推演
        // ==========================================
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // 1. 更新剑体 Shader 流光
            bladeMat.uniforms.uTime.value = time;

            // 2. 模拟剑体自身的轻微悬浮呼吸感
            swordGroup.position.y = Math.sin(time * 2) * 0.5;

            // 3. 火花粒子动力学
            const positions = sparkGeo.attributes.position.array;
            for(let i=0; i<sparkCount; i++) {
                positions[i*3] += sparkVel[i].x;
                positions[i*3+1] += sparkVel[i].y;
                positions[i*3+2] += sparkVel[i].z;

                // 如果火花飘得太高，重置回剑底
                if(positions[i*3+1] > 12) {
                    positions[i*3] = (Math.random() - 0.5) * 3;
                    positions[i*3+1] = -10 + Math.random() * 2;
                    positions[i*3+2] = (Math.random() - 0.5) * 2;
                }
            }
            sparkGeo.attributes.position.needsUpdate = true;

            // ⚠️ 极其重要：不再使用 renderer.render，必须使用 composer 进行后期合成渲染
            composer.render();
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
