<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        #v { position:absolute; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); opacity: 0.5; }
        #c { position:absolute; top:0; left:0; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>
    <script>
        const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');
        const offCanvas = document.createElement('canvas'), offCtx = offCanvas.getContext('2d');
        let prevData = null, x = 0, y = 0;

        navigator.mediaDevices.getUserMedia({video: true}).then(s => v.srcObject = s);

        function track() {
            if (v.readyState !== v.HAVE_ENOUGH_DATA) { requestAnimationFrame(track); return; }
            
            // 初始化画布大小
            if(c.width !== window.innerWidth) { c.width = offCanvas.width = v.videoWidth; c.height = offCanvas.height = v.videoHeight; }
            
            offCtx.drawImage(v, 0, 0);
            const currData = offCtx.getImageData(0, 0, v.videoWidth, v.videoHeight).data;
            
            if (prevData) {
                let sumX = 0, sumY = 0, count = 0;
                for (let i = 0; i < currData.length; i += 16) { // 每隔4个像素采样，保证流畅度
                    if (Math.abs(currData[i] - prevData[i]) > 50) { // 像素差异阈值
                        sumX += (i / 4) % v.videoWidth;
                        sumY += Math.floor((i / 4) / v.videoWidth);
                        count++;
                    }
                }
                if (count > 500) { // 动作幅度超过一定值才移动
                    x += (sumX / count - x) * 0.2;
                    y += (sumY / count - y) * 0.2;
                }
            }
            prevData = currData;

            // 绘制粒子
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0, 0, c.width, c.height);
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(c.width - x, y, 20, 0, Math.PI*2); ctx.fill();
            requestAnimationFrame(track);
        }
        v.onloadedmetadata = () => track();
    </script>
</body>
</html>
